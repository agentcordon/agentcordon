<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorization Complete — Agent Cordon</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #18181b;
            color: #e4e4e7;
            font-size: 14px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: #27272a;
            border: 1px solid #3f3f46;
            border-radius: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px 32px;
            text-align: center;
        }
        .icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 24px;
            background: rgba(74,222,128,0.1);
            color: #4ade80;
        }
        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        p {
            font-size: 0.875rem;
            color: #9e9ea8;
            line-height: 1.6;
        }
        @media (prefers-color-scheme: light) {
            body { background: #f6f5f3; color: #1a1a1a; }
            .card { background: #fff; border-color: rgba(0,0,0,0.08); box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
            .icon { background: #edfcf0; color: #2d7a3f; }
            p { color: #6b7280; }
        }
    </style>
</head>
<body>
    <div class="card" role="main">
        <div class="icon" aria-hidden="true">&#x2713;</div>
        <h1>Authorization Complete</h1>
        <p>Access has been granted to the workspace. You may close this tab and return to your terminal.</p>
    </div>
</body>
</html>
