<div class="panel-header">
    <h2>{{ server_name }}</h2>
    {% if enabled %}
    <span class="pill pill-ok">enabled</span>
    {% else %}
    <span class="pill pill-bad">disabled</span>
    {% endif %}
</div>
<div class="panel-body">
    <dl class="detail-list">
        <dt>ID</dt>
        <dd><code class="monospace">{{ server_id }}</code></dd>

        <dt>Transport</dt>
        <dd>{{ transport }}</dd>

        <dt>Upstream URL</dt>
        <dd><code class="monospace">{{ upstream_url }}</code></dd>

        <dt>Workspace</dt>
        <dd>{{ workspace_name }}</dd>

        <dt>Tools</dt>
        <dd>{{ tools_count }}</dd>

        <dt>Created</dt>
        <dd>{{ created_at }}</dd>
    </dl>
</div>
