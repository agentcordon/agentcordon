<div class="panel-header">
    <h2>{{ credential_name }}</h2>
    <span class="pill pill-type">{{ credential_type }}</span>
</div>
<div class="panel-body">
    <dl class="detail-list">
        <dt>ID</dt>
        <dd><code class="monospace">{{ credential_id }}</code></dd>

        <dt>Service</dt>
        <dd>{{ service }}</dd>

        <dt>Vault</dt>
        <dd>{{ vault }}</dd>

        <dt>Expires</dt>
        <dd>{% if expires_at == "Never" %}<span class="text-faint">Never</span>{% else %}{{ expires_at }}{% endif %}</dd>

        <dt>Created</dt>
        <dd>{{ created_at }}</dd>
    </dl>

    <!-- Grant to Workspace -->
    <div x-data="credPanelGrant()" x-init="loadWorkspaces()" class="panel-grant-section">
        <h3 class="panel-grant-title">Grant to Workspace</h3>
        <div class="panel-grant-form">
            <select x-model="workspace" class="form-input panel-grant-select" aria-label="Select workspace">
                <option value="" disabled>Select workspace...</option>
                <template x-for="w in workspaces" :key="w.id">
                    <option :value="w.id" x-text="w.name"></option>
                </template>
            </select>
            <select x-model="permission" class="form-input panel-grant-select" aria-label="Select permission">
                <option value="delegated_use">Delegated Use</option>
                <option value="vend_credential">Vend Credential</option>
                <option value="list">List</option>
                <option value="update">Update</option>
                <option value="delete">Delete</option>
            </select>
            <button class="btn btn-primary btn-sm"
                    @click="grant()"
                    :disabled="!workspace || submitting"
                    aria-label="Grant permission to selected workspace">
                <span x-text="submitting ? 'Granting...' : 'Grant'"></span>
            </button>
        </div>
    </div>

    <div class="panel-actions">
        <a href="/credentials/{{ credential_id }}" class="btn btn-secondary btn-sm">View Full Details</a>
    </div>
</div>

<script>
function credPanelGrant() {
    return {
        workspaces: [],
        workspace: '',
        permission: 'delegated_use',
        submitting: false,
        async loadWorkspaces() {
            try {
                var resp = await fetch('/api/v1/workspaces');
                if (resp.ok) {
                    var data = await resp.json();
                    this.workspaces = data.data || data || [];
                }
            } catch(e) { /* non-critical */ }
        },
        async grant() {
            if (!this.workspace) return;
            this.submitting = true;
            try {
                var resp = await fetch('/api/v1/credentials/{{ credential_id }}/permissions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': getCsrfToken()
                    },
                    body: JSON.stringify({
                        workspace_id: this.workspace,
                        permission: this.permission
                    })
                });
                if (resp.ok) {
                    showToast('Permission granted', 'success');
                    this.workspace = '';
                } else if (resp.status === 403) {
                    showToast('Permission denied — admin privileges required', 'error');
                } else {
                    showToast('Failed to grant permission', 'error');
                }
            } catch(e) { showToast('Failed to grant permission', 'error'); }
            this.submitting = false;
        }
    };
}
</script>
