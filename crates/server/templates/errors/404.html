                <path d="M8 18 Q8 12, 14 12 L75 55 Q82 60, 82 70 Q82 80, 75 85 L14 128 Q8 128, 8 122 Z" fill="currentColor"/>

<div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 56px);">

        <h1 style="font-size:4rem;opacity:0.2;margin:0;">404</h1>
        <p style="margin:1rem 0;">Page not found.</p>
        <a href="/dashboard" class="btn btn-primary">Go to Dashboard</a>
    </div>

{% endblock %}
